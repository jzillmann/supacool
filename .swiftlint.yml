strict: true

included:
  - supacode
  - Supacool
  - supacodeTests
excluded:
  - ThirdParty/ghostty

disabled_rules:
  - file_length
  - closure_parameter_position
  - type_body_length

opt_in_rules:
  - accessibility_label_for_image
  - accessibility_trait_for_button
  - async_without_await

opening_brace:
  ignore_multiline_function_signatures: true
  ignore_multiline_statement_conditions: true
  ignore_multiline_type_headers: true

trailing_comma:
  mandatory_comma: true

cyclomatic_complexity:
  warning: 15
  error: 20

# Codebase idioms, codified when Supacool/ joined the lint scope
# (2026-07-08, approved): the persistence convention's
# `let c = decoder.container(…)` and similar short locals; reducer
# helpers that thread 6–9 state params; multi-member effect tuples in
# TCA helpers. Everything else stays at SwiftLint defaults.
identifier_name:
  min_length: 1
  allowed_symbols: ["_"]  # TCA `._privateEffectAction` naming convention

function_parameter_count:
  warning: 9
  error: 12

large_tuple:
  warning: 3
  error: 5

# The forward-compatible Codable convention (docs/agent-guides/persistence.md)
# requires a nested CodingKeys enum inside every persisted struct, including
# structs already nested one level — so persisted types legitimately nest two
# deep. Allow it rather than fight the pattern.
nesting:
  type_level: 2

function_body_length:
  warning: 100
  error: 150

redundant_discardable_let:
  ignore_swiftui_view_bodies: true

custom_rules:
  store_state_mutation_in_views:
    name: "Store State Mutation In Views"
    regex: "\\bstore\\.[A-Za-z0-9_]+\\s*(?:\\+=|-=|\\*=|/=|=(?!=))"
    message: "Do not mutate store state directly in views. Send actions instead."
    severity: error
    included: "(supacode|Supacool)/.*/Views/.*\\.swift"
